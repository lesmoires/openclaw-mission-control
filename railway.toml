# ============================================
# RAILWAY CONFIG - Mission Control Les Moires
# Version: 2.0 (Production-Ready)
# ============================================

[build]
builder = "NIXPACKS"

# ============================================
# MÉTADONNÉES
# ============================================
[metadata]
name = "OpenClaw Mission Control - Les Moires"
description = "Centre de commande multi-agents pour orchestration OpenClaw"
icon = "🏗️"
version = "2.0.0"

# ============================================
# SERVICE: BACKEND (FastAPI)
# ============================================
[[services]]
name = "mission-control-backend"
path = "backend"

# Build
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

# Runtime
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

# Health & Resilience
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Resources (ajustable selon besoin)
[resources]
cpu = "shared"
memory = "512Mi"
disk = "1Gi"

# ============================================
# SERVICE: FRONTEND (Next.js)
# ============================================
[[services]]
name = "mission-control-frontend"
path = "frontend"

# Build
builder = "NIXPACKS"
buildCommand = "npm run build"
startCommand = "npm start"

# Health
healthcheckPath = "/"
healthcheckTimeout = 30

# Resources
[resources]
cpu = "shared"
memory = "256Mi"

# ============================================
# SERVICE: WORKER (RQ - Optionnel)
# Désactivé par défaut car on utilise mode synchrone
# avec Supabase existant. Décommenter si besoin async.
# ============================================
# [[services]]
# name = "mission-control-worker"
