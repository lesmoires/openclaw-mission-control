# ============================================
# RAILWAY CONFIG V3 - Production Ready
# Avec toutes les best practices officielles
# ============================================

[build]
builder = "NIXPACKS"

# ============================================
# MÉTADONNÉES (Best Practice: Documentation)
# ============================================
[metadata]
name = "OpenClaw Mission Control"
description = "Centre de commande multi-agents pour orchestration OpenClaw"
version = "2.0.0"
author = "Les Moires"
icon = "${{ icon }}"

# ============================================
# SERVICE: BACKEND (FastAPI)
# ============================================
[[services]]
name = "Mission Control Backend"
# Best Practice: Capital Case, pas de tirets

source = "github"
repo = "lesmoires/openclaw-mission-control"
branch = "main"
# Build depuis la racine car Dockerfile utilise les chemins backend/

# Build
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

# Runtime
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

# Health Check (Best Practice: Requis)
healthcheckPath = "/health"
healthcheckTimeout = 60

# Résilience
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Private Networking (Best Practice: OBLIGATOIRE)
# Le backend communique avec:
# - Supabase via postgres.railway.internal (ou URL externe si Supabase externe)
# - Gateway OpenClaw via gateway.railway.internal

# ============================================
# SERVICE: FRONTEND (Next.js)
# ============================================
[[services]]
name = "Mission Control Frontend"
source = "github"
repo = "lesmoires/openclaw-mission-control"
branch = "main"
rootDirectory = "frontend"

# Build
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"
startCommand = "npm start"

# Health Check
healthcheckPath = "/"
healthcheckTimeout = 30

# Variables pour le build
[[services.variables]]
name = "NEXT_PUBLIC_API_URL"
value = "https://${{ BACKEND_URL }}/api"

[[services.variables]]
name = "NEXT_PUBLIC_AUTH_MODE"
value = "${{ AUTH_MODE }}"

# ============================================
# BASE DE DONNÉES
# Option: Supabase existant (recommandé pour coût)
# ou Railway PostgreSQL (isolation)
# ============================================

# Si on veut une DB Railway dédiée:
# [[databases]]
# name = "mission-control-db"
# engine = "POSTGRES"

# ============================================
# VARIABLES GLOBALES (Best Practice: Documentées)
# ============================================
[env]
# Authentification (CRITIQUE)
AUTH_MODE = "local"
LOCAL_AUTH_TOKEN = { required = true, description = "Token 50+ chars (openssl rand -hex 32)" }

# OpenClaw Gateway Connection
OPENCLAW_GATEWAY_URL = "ws://gateway.railway.internal:18789"
OPENCLAW_GATEWAY_TOKEN = { required = true, description = "Token Gateway OpenClaw" }

# Database (utilise Supabase existant ou Railway)
DATABASE_URL = { required = true, description = "URL PostgreSQL" }

# Configuration
CORS_ORIGINS = "*"
DB_AUTO_MIGRATE = "true"
LOG_LEVEL = "INFO"

# ============================================
# HOOKS (Optionnel mais recommandé)
# ============================================
[[hooks]]
event = "deploy"
command = "echo '✅ Mission Control déployé avec succès'"
